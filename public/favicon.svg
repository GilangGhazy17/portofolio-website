<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f3f4f6" rx="40"/>
  
  <!-- Book spine (center) -->
  <line x1="100" y1="60" x2="100" y2="140" stroke="#1f2937" stroke-width="3"/>
  
  <!-- Left page -->
  <path d="M 60 60 L 100 60 L 100 140 L 60 140 Z" fill="#ffffff" stroke="#1f2937" stroke-width="2.5"/>
  
  <!-- Right page -->
  <path d="M 100 60 L 140 60 L 140 140 L 100 140 Z" fill="#f9fafb" stroke="#1f2937" stroke-width="2.5"/>
  
  <!-- Left page lines (text representation) -->
  <line x1="70" y1="75" x2="90" y2="75" stroke="#6b7280" stroke-width="1.5" opacity="0.6"/>
  <line x1="70" y1="85" x2="90" y2="85" stroke="#6b7280" stroke-width="1.5" opacity="0.6"/>
  <line x1="70" y1="95" x2="85" y2="95" stroke="#6b7280" stroke-width="1.5" opacity="0.6"/>
  <line x1="70" y1="110" x2="90" y2="110" stroke="#6b7280" stroke-width="1.5" opacity="0.6"/>
  <line x1="70" y1="120" x2="88" y2="120" stroke="#6b7280" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Right page lines (text representation) -->
  <line x1="110" y1="75" x2="130" y2="75" stroke="#6b7280" stroke-width="1.5" opacity="0.6"/>
  <line x1="110" y1="85" x2="130" y2="85" stroke="#6b7280" stroke-width="1.5" opacity="0.6"/>
  <line x1="110" y1="95" x2="125" y2="95" stroke="#6b7280" stroke-width="1.5" opacity="0.6"/>
  <line x1="110" y1="110" x2="130" y2="110" stroke="#6b7280" stroke-width="1.5" opacity="0.6"/>
  <line x1="110" y1="120" x2="128" y2="120" stroke="#6b7280" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Accent dots (knowledge/learning theme) -->
  <circle cx="75" cy="130" r="2" fill="#4f46e5" opacity="0.7"/>
  <circle cx="120" cy="130" r="2" fill="#4f46e5" opacity="0.7"/>
</svg>
